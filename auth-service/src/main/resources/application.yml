server:
  port: 8081

spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:127.0.0.1}:8848
        namespace: ${NACOS_NAMESPACE:}

mybatis:
  configuration:
    map-underscore-to-camel-case: true
