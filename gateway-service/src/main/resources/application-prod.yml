spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:nacos}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:}
    gateway:
      httpclient:
        connect-timeout: 3000
        response-timeout: 10s
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

server:
  compression:
    enabled: true

logging:
  level:
    root: INFO
    com.jiejie.gateway: INFO
