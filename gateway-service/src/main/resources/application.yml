server:
  port: 8080

spring:
  application:
    name: gateway-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
        ip: ${NACOS_REGISTER_IP:127.0.0.1}
        namespace: ${NACOS_NAMESPACE:}
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-route
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: product-route
          uri: lb://product-service
          predicates:
            - Path=/product/**, /images/**
        - id: order-route
          uri: lb://order-service
          predicates:
            - Path=/order/**, /cart/**, /user/**
