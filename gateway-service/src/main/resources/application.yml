server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      # 👉 终极跨域配置
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*" # 允许所有来源
            allowedMethods: "*"        # 允许所有方法 (GET, POST等)
            allowedHeaders: "*"        # 允许所有请求头
            allowCredentials: true     # 允许携带 Cookie
      routes:
        # 1. 认证服务路由
        - id: auth-route
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        # 2. 商品服务路由
        - id: product-route
          uri: lb://product-service
          predicates:
            - Path=/product/**
        # 3. 订单/购物车服务路由
        - id: order-route
          uri: lb://order-service
          predicates:
            - Path=/order/**, /cart/** # 👈 同时匹配 /order 和 /cart 开头的请求