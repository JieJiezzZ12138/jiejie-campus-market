server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-route
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: product-route
          uri: lb://product-service
          predicates:
            - Path=/product/**
        # 👉 核心修复：允许网关转发 /user 开头的请求到 order-service
        - id: order-route
          uri: lb://order-service
          predicates:
            - Path=/order/**, /cart/**, /user/**