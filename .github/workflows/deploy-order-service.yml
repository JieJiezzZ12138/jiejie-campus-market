name: Deploy Order Service

on:
  push:
    branches: ["main"]
    paths:
      - "order-service/**"
      - "Dockerfile.order-service"
      - ".github/workflows/deploy-order-service.yml"
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Order JAR
        run: mvn -B -ntp -pl order-service -am clean package -DskipTests

      - name: Build and Push Image
        run: |
          ls -lah order-service/target/
          test -f "$(ls order-service/target/order-service-*-exec.jar | head -n 1)"

          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login --username "${{ secrets.REGISTRY_USER }}" crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com --password-stdin
          docker build -f ./Dockerfile.order-service -t crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com/jiejie-proj/order-service:latest .
          docker push crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com/jiejie-proj/order-service:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to ECS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login --username "${{ secrets.REGISTRY_USER }}" crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com --password-stdin
            docker stop order-service-container || true
            docker rm order-service-container || true
            docker pull crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com/jiejie-proj/order-service:latest

            docker run -d \
              --name order-service-container \
              --network host \
              -m 300m \
              --memory-swap 420m \
              --cpus="0.40" \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e JAVA_TOOL_OPTIONS="-Xms64m -Xmx160m -Xss256k -XX:MaxDirectMemorySize=48m" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
              -e NACOS_HOST="${{ secrets.NACOS_HOST != '' && secrets.NACOS_HOST || '127.0.0.1' }}" \
              crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com/jiejie-proj/order-service:latest

            docker image prune -f
