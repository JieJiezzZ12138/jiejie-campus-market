name: Java CICD with Docker (Auth Service)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Build and Push Docker Image
        run: |
          # 1. 登录阿里云容器镜像服务
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login --username "${{ secrets.REGISTRY_USER }}" crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com --password-stdin
          
          # 2. 构建 Auth 服务镜像 (注意末尾的 . 代表当前目录)
          docker build -f ./Dockerfile -t crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com/jiejie-proj/auth-service:latest .
          
          # 3. 推送镜像
          docker push crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com/jiejie-proj/auth-service:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Aliyun
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 在服务器上登录阿里云镜像服务
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login --username "${{ secrets.REGISTRY_USER }}" crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com --password-stdin
            
            # 2. 停止并删除旧容器、旧镜像
            docker stop auth-service-container || true
            docker rm auth-service-container || true
            docker rmi crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com/jiejie-proj/auth-service:latest || true
            
            # 3. 拉取最新镜像
            docker pull crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com/jiejie-proj/auth-service:latest
            
            # 4. 运行新容器
            # --network host: 让容器直接使用宿主机网络(localhost能直接连上Nacos和MySQL)
            # -m 180m: 严格限制内存，防止服务器 OOM
            docker run -d \
              --name auth-service-container \
              --network host \
              -m 180m \
              --cpus="0.5" \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
              crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com/jiejie-proj/auth-service:latest
            
            # 5. 清理无用的虚悬镜像释放磁盘空间
            docker image prune -f