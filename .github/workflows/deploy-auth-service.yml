name: Deploy Auth Service

on:
  push:
    branches: ["main"]
    paths:
      - "auth-service/**"
      - "Dockerfile.auth-service"
      - ".github/workflows/deploy-auth-service.yml"
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Auth JAR
        run: mvn -B -ntp -pl auth-service -am clean package -DskipTests

      - name: Build and Push Image
        run: |
          ls -lah auth-service/target/
          test -f "$(ls auth-service/target/auth-service-*.jar | head -n 1)"

          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login --username "${{ secrets.REGISTRY_USER }}" crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com --password-stdin
          docker build -f ./Dockerfile.auth-service -t crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com/jiejie-proj/auth-service:latest .
          docker push crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com/jiejie-proj/auth-service:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to ECS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login --username "${{ secrets.REGISTRY_USER }}" crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com --password-stdin
            docker stop auth-service-container || true
            docker rm auth-service-container || true
            docker pull crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com/jiejie-proj/auth-service:latest

            docker run -d \
              --name auth-service-container \
              --network host \
              -m 180m \
              --memory-swap 260m \
              --cpus="0.25" \
              --restart unless-stopped \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e JAVA_TOOL_OPTIONS="-Xms32m -Xmx80m -Xss256k -XX:MaxDirectMemorySize=16m" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
              -e NACOS_HOST="${{ secrets.NACOS_HOST != '' && secrets.NACOS_HOST || '127.0.0.1' }}" \
              crpi-jvx8niudq85i5x0v.cn-beijing.personal.cr.aliyuncs.com/jiejie-proj/auth-service:latest

            docker image prune -f
