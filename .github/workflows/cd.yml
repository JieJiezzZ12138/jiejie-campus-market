name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to server (requires DEPLOY_* secrets)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  package:
    name: Package Release Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend
        run: mvn -B -ntp -DskipTests clean package

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Assemble artifact
        run: |
          mkdir -p release/backend release/frontend
          cp auth-service/target/*.jar release/backend/
          cp gateway-service/target/*.jar release/backend/
          cp order-service/target/*.jar release/backend/
          cp product-service/target/*.jar release/backend/
          cp -R frontend/dist release/frontend/
          tar -czf release/my-system-cloud-${GITHUB_SHA}.tar.gz -C release backend frontend

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-system-cloud-${{ github.sha }}
          path: release/my-system-cloud-${{ github.sha }}.tar.gz
          retention-days: 14

  deploy:
    name: Deploy via SSH
    needs: package
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')) && secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_PATH != '' }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-system-cloud-${{ github.sha }}
          path: release

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT || '22' }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload package to server
        run: |
          scp -i ~/.ssh/deploy_key -P "${{ secrets.DEPLOY_PORT || '22' }}" \
            release/my-system-cloud-${GITHUB_SHA}.tar.gz \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Extract and run remote deploy script
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT || '22' }}" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
          set -e
          ARCHIVE_PATH="${{ secrets.DEPLOY_PATH }}/my-system-cloud-${GITHUB_SHA}.tar.gz"
          RELEASE_DIR="${{ secrets.DEPLOY_PATH }}/releases/${GITHUB_SHA}"
          mkdir -p "${RELEASE_DIR}"
          tar -xzf "${ARCHIVE_PATH}" -C "${RELEASE_DIR}"

          if [ -n "${{ secrets.DEPLOY_SCRIPT }}" ] && [ -f "${{ secrets.DEPLOY_SCRIPT }}" ]; then
            bash "${{ secrets.DEPLOY_SCRIPT }}" "${RELEASE_DIR}"
          else
            echo "No DEPLOY_SCRIPT provided. Artifact extracted to ${RELEASE_DIR}."
          fi
          EOF
