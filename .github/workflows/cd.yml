name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to server (requires DEPLOY_* secrets)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  package:
    name: Package Release Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend
        run: mvn -B -ntp -DskipTests clean package

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Assemble artifact
        run: |
          mkdir -p release/backend release/frontend
          cp auth-service/target/*.jar release/backend/
          cp gateway-service/target/*.jar release/backend/
          cp order-service/target/*.jar release/backend/
          cp product-service/target/*.jar release/backend/
          cp -R frontend/dist release/frontend/
          tar -czf release/my-system-cloud-${{ github.sha }}.tar.gz -C release backend frontend

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-system-cloud-${{ github.sha }}
          path: release/my-system-cloud-${{ github.sha }}.tar.gz
          retention-days: 14

  deploy:
    name: Deploy via SSH
    needs: package
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true') }}
    steps:
      - name: Validate deploy secrets
        id: deploy_check
        run: |
          missing=""
          [ -z "${{ secrets.DEPLOY_HOST }}" ] && missing="$missing DEPLOY_HOST"
          [ -z "${{ secrets.DEPLOY_USER }}" ] && missing="$missing DEPLOY_USER"
          [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ] && missing="$missing DEPLOY_SSH_KEY"
          [ -z "${{ secrets.DEPLOY_PATH }}" ] && missing="$missing DEPLOY_PATH"
          if [ -n "$missing" ]; then
            echo "::warning::Skip deploy. Missing secrets:$missing"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifact
        if: ${{ steps.deploy_check.outputs.skip != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: my-system-cloud-${{ github.sha }}
          path: release

      - name: Configure SSH key
        if: ${{ steps.deploy_check.outputs.skip != 'true' }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT || '22' }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload package to server
        if: ${{ steps.deploy_check.outputs.skip != 'true' }}
        run: |
          scp -i ~/.ssh/deploy_key -P "${{ secrets.DEPLOY_PORT || '22' }}" \
            release/my-system-cloud-${{ github.sha }}.tar.gz \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Extract and run remote deploy script
        if: ${{ steps.deploy_check.outputs.skip != 'true' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT || '22' }}" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}' ARTIFACT_NAME='my-system-cloud-${{ github.sha }}.tar.gz' RELEASE_SHA='${{ github.sha }}' DEPLOY_SCRIPT='${{ secrets.DEPLOY_SCRIPT }}' bash -s" <<'EOF'
          set -e
          ARCHIVE_PATH="${DEPLOY_PATH}/${ARTIFACT_NAME}"
          RELEASE_DIR="${DEPLOY_PATH}/releases/${RELEASE_SHA}"
          if [ ! -f "${ARCHIVE_PATH}" ]; then
            echo "Archive not found: ${ARCHIVE_PATH}"
            ls -lah "${DEPLOY_PATH}" || true
            exit 2
          fi
          mkdir -p "${RELEASE_DIR}"
          tar -xzf "${ARCHIVE_PATH}" -C "${RELEASE_DIR}"

          if [ -n "${DEPLOY_SCRIPT}" ] && [ -f "${DEPLOY_SCRIPT}" ]; then
            bash "${DEPLOY_SCRIPT}" "${RELEASE_DIR}"
          else
            echo "No DEPLOY_SCRIPT provided. Artifact extracted to ${RELEASE_DIR}."
          fi
          EOF
